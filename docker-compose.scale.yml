# Scale override: run 2 backend instances for cross-instance testing
# Usage: docker compose -f docker-compose.yml -f docker-compose.scale.yml up --build -d

services:
  nginx:
    volumes:
      - ./nginx/default.scale.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
      - backend2

  # Override original backend to use explicit port
  backend:
    ports:
      - "8081:8080"
    environment:
      - PORT=8080
      - DB_URL=postgres://lingouser:lingopass@postgres:5432/lingodb?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-super-secret-jwt-key-change-in-production}
      - GIN_MODE=release

  # Second backend instance
  backend2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - PORT=8080
      - DB_URL=postgres://lingouser:lingopass@postgres:5432/lingodb?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-super-secret-jwt-key-change-in-production}
      - GIN_MODE=release
    restart: unless-stopped
    networks:
      - lingo-net
