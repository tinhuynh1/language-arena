services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - lingo-net

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_URL=${DB_URL:-postgres://lingouser:lingopass@postgres:5432/lingodb?sslmode=disable}
    networks:
      - lingo-net
    restart: on-failure

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    environment:
      - PORT=8080
      - DB_URL=${DB_URL:-postgres://lingouser:lingopass@postgres:5432/lingodb?sslmode=disable}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - JWT_SECRET=${JWT_SECRET:-super-secret-jwt-key-change-in-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - GIN_MODE=release
    restart: unless-stopped
    networks:
      - lingo-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - lingo-net

  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lingodb}
      POSTGRES_USER: ${POSTGRES_USER:-lingouser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lingopass}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lingouser} -d ${POSTGRES_DB:-lingodb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - lingo-net

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    restart: unless-stopped
    networks:
      - lingo-net

volumes:
  pgdata:
  redisdata:

networks:
  lingo-net:
    driver: bridge
