apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: lingo-sniper
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: cloud-sql-proxy
      initContainers:
        # ── Cloud SQL Auth Proxy (native sidecar — starts before backend) ──
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.1
          restartPolicy: Always
          args:
            - "--structured-logs"
            - "--auto-iam-authn"
            - "--address=0.0.0.0"
            - "lingo-sniper-prod:us-central1:lingo-sniper-db"
          securityContext:
            runAsNonRoot: true
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
      containers:
        # ── Go Backend ──
        - name: backend
          image: asia-southeast1-docker.pkg.dev/lingo-sniper-prod/lingo-sniper/backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: lingo-secrets
                  key: db-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: lingo-secrets
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lingo-secrets
                  key: jwt-secret
            - name: LOG_LEVEL
              value: "info"
            - name: LOG_FORMAT
              value: "json"
            - name: GIN_MODE
              value: "release"
            - name: CORS_ORIGINS
              value: "https://lingosniper.lol"
            - name: ALLOWED_WS_ORIGINS
              value: "https://lingosniper.lol"
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30

