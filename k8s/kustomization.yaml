apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  # secrets.yaml bị loại bỏ khỏi CI/CD vì chứa placeholder CHANGE_ME
  # Secret thật đã được tạo thủ công bằng: kubectl create secret generic lingo-secrets ...
  - backend/deployment.yaml
  - backend/service.yaml
  - frontend/deployment.yaml
  - frontend/service.yaml
  - redis/deployment.yaml
  - ingress.yaml
  - cluster-issuer.yaml

images:
  - name: asia-southeast1-docker.pkg.dev/lingo-sniper-prod/lingo-sniper/backend
    newName: asia-southeast1-docker.pkg.dev/lingo-sniper-prod/lingo-sniper/backend
    newTag: latest
  - name: asia-southeast1-docker.pkg.dev/lingo-sniper-prod/lingo-sniper/frontend
    newName: asia-southeast1-docker.pkg.dev/lingo-sniper-prod/lingo-sniper/frontend
    newTag: latest
