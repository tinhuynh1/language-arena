# ⚠️ This is a TEMPLATE. Replace values before applying.
# In production, use: kubectl create secret generic lingo-secrets \
#   --from-literal=db-url='postgres://...' \
#   --from-literal=jwt-secret='...' \
#   -n lingo-sniper
apiVersion: v1
kind: Secret
metadata:
  name: lingo-secrets
  namespace: lingo-sniper
type: Opaque
stringData:
  # Cloud SQL connection via proxy (sidecar connects to localhost)
  db-url: "postgres://lingouser:CHANGE_ME@localhost:5432/lingodb?sslmode=disable"
  jwt-secret: "CHANGE_ME_USE_openssl_rand_base64_32"
  redis-url: "redis://redis:6379"
